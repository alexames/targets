name: CI - Build Examples

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-examples:
    name: Build Examples on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            triplet: x64-linux
          - os: windows-latest
            triplet: x64-windows
          - os: macos-latest
            triplet: x64-osx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '834977918592e4f5d5ec5fe48ba338c608faf9f9'

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        env:
          # run-vcpkg@v11 defaults VCPKG_BINARY_SOURCES to "clear;x-gha,readwrite", but the
          # x-gha provider needs ACTIONS_CACHE_URL/ACTIONS_RUNTIME_TOKEN, which current GitHub
          # runners no longer expose (the classic Actions cache service was decommissioned).
          # That made `vcpkg install` hard-fail at project(). Disable remote binary caching so
          # dependencies build from source. Step-level env overrides what run-vcpkg exported.
          VCPKG_BINARY_SOURCES: clear
        run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} -DTARGETS_BUILD_EXAMPLES=ON -DTARGETS_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build Examples
        run: cmake --build build --config Release

      - name: Test executable_with_deps example (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ -f build/examples/executable_with_deps/CalculatorApp ]; then
            ./build/examples/executable_with_deps/CalculatorApp
          else
            echo "CalculatorApp executable not found"
            exit 1
          fi

      - name: Test executable_with_deps example (Windows)
        if: runner.os == 'Windows'
        run: |
          if (Test-Path "build\examples\executable_with_deps\Release\CalculatorApp.exe") {
            & "build\examples\executable_with_deps\Release\CalculatorApp.exe"
          } else {
            Write-Error "CalculatorApp.exe not found"
            exit 1
          }

      # Runs the SHARED-library example (issue #21). On Windows this only launches if
      # Greeter.dll was staged next to GreeterApp.exe (proving DLL staging) and the exe linked
      # against a populated import library (proving EXPORT_HEADER exports symbols). On
      # Ubuntu/macOS it links the shared object, found via the build-tree RPATH.
      - name: Test shared_library example (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ -f build/examples/shared_library/GreeterApp ]; then
            ./build/examples/shared_library/GreeterApp
          else
            echo "GreeterApp executable not found"
            exit 1
          fi

      - name: Test shared_library example (Windows)
        if: runner.os == 'Windows'
        run: |
          if (Test-Path "build\examples\shared_library\Release\GreeterApp.exe") {
            & "build\examples\shared_library\Release\GreeterApp.exe"
          } else {
            Write-Error "GreeterApp.exe not found"
            exit 1
          }

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: build-logs-${{ matrix.os }}
          path: |
            build/**/*.log
            build/CMakeFiles/**/*.log

  consume-port:
    name: Consume in-repo vcpkg port on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            triplet: x64-linux
          - os: windows-latest
            triplet: x64-windows
          - os: macos-latest
            triplet: x64-osx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '834977918592e4f5d5ec5fe48ba338c608faf9f9'

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      # Installs the in-repo ports/targets overlay port end-to-end and configures a real
      # consumer that calls find_package(Targets CONFIG REQUIRED). This fails if the port
      # ever regresses to installing a layout that find_package cannot resolve (issue #2).
      - name: Configure consumer against the overlay port
        env:
          # See the Build Examples job: disable the broken x-gha binary cache so vcpkg installs
          # the overlay port (and its host tools) by building from source instead of failing.
          VCPKG_BINARY_SOURCES: clear
        run: cmake -B build-consume -S tests/consume_port -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} -DVCPKG_OVERLAY_PORTS="${{ github.workspace }}/ports" -DCMAKE_BUILD_TYPE=Release

      - name: Build consumer
        run: cmake --build build-consume --config Release

      - name: Run consumer (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: ./build-consume/greet

      - name: Run consumer (Windows)
        if: runner.os == 'Windows'
        run: .\build-consume\Release\greet.exe

  install-export:
    name: Install + downstream find_package on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      # End-to-end proof of the install/export feature (issue #20). The producer is the
      # examples/install_export project: a cpp_library marked INSTALL EXPORT. It has no
      # external dependencies, so no vcpkg toolchain is needed -- the OS's default compiler
      # (gcc/clang/MSVC) suffices. Build it and install it to a staging prefix.
      - name: Configure producer (install_export example)
        run: cmake -B build-produce -S examples/install_export -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/stage"

      - name: Build producer
        run: cmake --build build-produce --config Release

      - name: Install producer
        run: cmake --install build-produce --config Release

      # The consumer (tests/consume_install) does NOT include Targets; it relies solely on
      # the generated package config. find_package(WidgetKit CONFIG REQUIRED) must resolve
      # against the staging prefix and the exported WidgetKit::Widget target must link.
      - name: Configure consumer against the install prefix
        run: cmake -B build-consume -S tests/consume_install -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ github.workspace }}/stage"

      - name: Build consumer
        run: cmake --build build-consume --config Release

      - name: Run consumer (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: ./build-consume/use_widget

      - name: Run consumer (Windows)
        if: runner.os == 'Windows'
        run: .\build-consume\Release\use_widget.exe
